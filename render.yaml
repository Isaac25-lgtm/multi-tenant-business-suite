services:
  - type: web
    name: denove-aps
    branch: main
    runtime: python
    plan: starter
    region: oregon
    numInstances: 1
    rootDir: backend
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    maxShutdownDelaySeconds: 45
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    preDeployCommand: python -m flask --app run:app db-ensure && python -m flask --app run:app db upgrade && python -m flask --app run:app db-doctor
    startCommand: gunicorn run:app --config gunicorn.conf.py
    disk:
      name: denove-uploads
      mountPath: /opt/render/project/src/backend/app/static/uploads
      sizeGB: 5
    envVars:
      - key: FLASK_APP
        value: run:app
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/backend/app/static/uploads
      - key: MAX_CONTENT_LENGTH
        value: "5242880"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GUNICORN_THREADS
        value: "4"
      - key: GUNICORN_TIMEOUT
        value: "120"
      - key: GUNICORN_GRACEFUL_TIMEOUT
        value: "30"
      - key: GUNICORN_KEEPALIVE
        value: "5"
      - key: GUNICORN_MAX_REQUESTS
        value: "1000"
      - key: GUNICORN_MAX_REQUESTS_JITTER
        value: "100"
      - key: DB_POOL_SIZE
        value: "2"
      - key: DB_MAX_OVERFLOW
        value: "2"
      - key: DB_POOL_TIMEOUT
        value: "30"
      - key: DB_POOL_RECYCLE
        value: "300"
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard with your PostgreSQL connection string
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SECRET_KEY
        sync: false  # Set manually in Render dashboard - must be a stable 64+ char random string
